[server]
headless = true
port = 8502
address = "0.0.0.0"
runOnSave = false
enableCORS = true
enableXsrfProtection = true

[browser]
gatherUsageStats = false

[theme]
primaryColor = "rgb(177, 203, 33)"
backgroundColor = "#424242"
secondaryBackgroundColor = "#2e2e2e"
textColor = "#fcfcfc"
font = "sans serif"

[client]
toolbarMode = "minimal"

[ui]
hideTopBar = true